# ============================================
# CWU Z NADWYŻKI PV (TYLKO W ZIELONEJ STREFIE CENOWEJ)
# ============================================

- id: cwu_pv_surplus_enable
  alias: "[CWU] Włącz grzanie z nadwyżki PV (zielona cena)"
  description: "Włącza wymuszenie CWU gdy: nadwyżka PV > 1500W, SOC >= Target SOC (bateria ma priorytet), cena < p33, temp < 55°C"
  trigger:
    # Trigger gdy nadwyżka PV przekroczy 1500 W
    - platform: numeric_state
      entity_id: sensor.nadwyzka_pv
      above: 1500
  condition:
    # Wszystkie warunki muszą być spełnione
    - condition: and
      conditions:
        # 1. CWU aktualnie nie grzeje (nie wymuszamy podczas normalnego cyklu)
        - condition: state
          entity_id: water_heater.bodynek_nb_tank
          state: "off"
        # 2. Wymuszenie CWU jest wyłączone (nie dublujemy)
        - condition: state
          entity_id: switch.bodynek_nb_wymus_c_w_u
          state: "off"
        # 3. Bateria naładowana do Target SOC (priorytet: bateria > CWU)
        - condition: template
          value_template: >
            {% set soc = states('sensor.akumulatory_stan_pojemnosci') | float(0) %}
            {% set target = states('input_number.battery_target_soc') | float(80) %}
            {{ soc >= target }}
        # 4. Cena energii < p33 (DYNAMICZNY próg zielonej strefy)
        - condition: template
          value_template: >
            {% set cena = states('sensor.cena_zakupu_energii') | float(1) %}
            {% set p33 = state_attr('sensor.rce_progi_cenowe', 'p33') | float(0.5) %}
            {{ cena < p33 }}
        # 5. Temperatura wody < 55°C (zapas przed wyłączeniem)
        - condition: template
          value_template: >
            {{ state_attr('water_heater.bodynek_nb_tank', 'current_temperature') | float(60) < 55 }}
  action:
    # Oznacz że włączono przez automatyzację PV
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.cwu_pv_surplus_active
    # Włącz wymuszenie CWU
    - service: switch.turn_on
      target:
        entity_id: switch.bodynek_nb_wymus_c_w_u
    # Powiadomienie
    - service: persistent_notification.create
      data:
        title: "🌞 CWU: Włączono grzanie z nadwyżki PV"
        message: |
          ✅ Wymuszenie CWU włączone

          **Warunki spełnione:**
          - Nadwyżka PV: {{ states('sensor.nadwyzka_pv') }} W (> 1500 W)
          - SOC: {{ states('sensor.akumulatory_stan_pojemnosci') }}% >= Target {{ states('input_number.battery_target_soc') }}%
          - Cena RCE: {{ states('sensor.cena_zakupu_energii') }} PLN/kWh
          - Próg p33: {{ state_attr('sensor.rce_progi_cenowe', 'p33') }} PLN/kWh
          - Temp wody: {{ state_attr('water_heater.bodynek_nb_tank', 'current_temperature') }}°C

          Grzanie wyłączy się gdy:
          - Nadwyżka < 500 W LUB
          - Temp wody > 55°C
        notification_id: cwu_pv_surplus
  mode: single

- id: cwu_pv_surplus_disable
  alias: "[CWU] Wyłącz grzanie (brak nadwyżki lub temp osiągnięta)"
  description: "Wyłącza wymuszenie CWU gdy: nadwyżka PV < 500W LUB temp wody > 55°C (tylko gdy włączone przez automatyzację PV)"
  trigger:
    # Trigger 1: Nadwyżka PV spadła poniżej 500 W
    - platform: numeric_state
      entity_id: sensor.nadwyzka_pv
      below: 500
      id: low_surplus
    # Trigger 2: Temperatura wody przekroczyła 55°C
    - platform: template
      value_template: >
        {{ state_attr('water_heater.bodynek_nb_tank', 'current_temperature') | float(0) > 55 }}
      id: high_temp
  condition:
    # Tylko jeśli CWU włączone przez automatyzację PV (nie ręcznie!)
    - condition: state
      entity_id: input_boolean.cwu_pv_surplus_active
      state: "on"
  action:
    # Wyłącz wymuszenie CWU
    - service: switch.turn_off
      target:
        entity_id: switch.bodynek_nb_wymus_c_w_u
    # Wyłącz flagę automatyzacji
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.cwu_pv_surplus_active
    # Powiadomienie z powodem
    - service: persistent_notification.create
      data:
        title: "🌙 CWU: Wyłączono grzanie z nadwyżki PV"
        message: |
          ❌ Wymuszenie CWU wyłączone

          **Powód:** {% if trigger.id == 'low_surplus' %}Nadwyżka PV < 500 W{% else %}Temp wody > 55°C{% endif %}

          **Aktualny stan:**
          - Nadwyżka PV: {{ states('sensor.nadwyzka_pv') }} W
          - Temp wody: {{ state_attr('water_heater.bodynek_nb_tank', 'current_temperature') }}°C
        notification_id: cwu_pv_surplus
  mode: single

# ============================================
# RĘCZNE WYMUSZENIE CWU - DO OSIĄGNIĘCIA TEMP CELU (MAX 2H)
# ============================================

- id: cwu_manual_force_auto_off
  alias: "[CWU] Wymuszenie CWU do osiągnięcia temp celu (max 2h)"
  description: "Wymuszenie CWU działa do osiągnięcia temperatury celu, max 2h jako zabezpieczenie"
  trigger:
    - platform: state
      entity_id: switch.bodynek_nb_wymus_c_w_u
      to: "on"
  condition:
    # Tylko jeśli NIE włączone przez automatyzację PV (ta ma własne zarządzanie)
    - condition: state
      entity_id: input_boolean.cwu_pv_surplus_active
      state: "off"
  action:
    # Powiadomienie o starcie
    - service: persistent_notification.create
      data:
        title: "🌡️ CWU: Wymuszenie włączone"
        message: |
          🔄 Grzanie CWU do osiągnięcia temperatury celu (max 2h)

          Temp aktualna: {{ state_attr('water_heater.bodynek_nb_tank', 'current_temperature') }}°C
          Temp docelowa: {{ state_attr('water_heater.bodynek_nb_tank', 'temperature') }}°C
        notification_id: cwu_manual_auto_off
    # Czekaj aż temperatura osiągnie cel (max 2h)
    - wait_template: >
        {{ state_attr('water_heater.bodynek_nb_tank', 'current_temperature') | float(0) >=
           state_attr('water_heater.bodynek_nb_tank', 'temperature') | float(55) }}
      timeout:
        hours: 2
      continue_on_timeout: true
    # Wyłącz wymuszenie CWU
    - service: switch.turn_off
      target:
        entity_id: switch.bodynek_nb_wymus_c_w_u
    # Powiadomienie o zakończeniu
    - service: persistent_notification.create
      data:
        title: "{% if wait.completed %}✅ CWU: Temp osiągnięta{% else %}⏱️ CWU: Timeout 2h{% endif %}"
        message: |
          {% if wait.completed %}
          ✅ Wymuszenie CWU wyłączone - temperatura celu osiągnięta!
          {% else %}
          ⏱️ Wymuszenie CWU wyłączone - timeout 2h (zabezpieczenie)
          {% endif %}

          Temp końcowa: {{ state_attr('water_heater.bodynek_nb_tank', 'current_temperature') }}°C
          Temp docelowa: {{ state_attr('water_heater.bodynek_nb_tank', 'temperature') }}°C
        notification_id: cwu_manual_auto_off
  mode: single

# ============================================
# WATCHDOG AQUAREA - SPRAWDZANIE TOKENU
# ============================================

- id: aquarea_watchdog_token
  alias: "[Aquarea] Watchdog - sprawdzanie połączenia"
  description: "Co godzinę o :47 sprawdza czy integracja Aquarea działa. Jeśli unavailable - przeładowuje."
  trigger:
    - platform: time_pattern
      minutes: "47"
  condition:
    # Sprawdź czy encja jest unavailable
    - condition: state
      entity_id: water_heater.bodynek_nb_tank
      state: "unavailable"
  action:
    # Powiadomienie o wykryciu problemu
    - service: persistent_notification.create
      data:
        title: "🔧 Aquarea: Wykryto problem z połączeniem"
        message: |
          ⚠️ Encja water_heater.bodynek_nb_tank jest niedostępna.

          🔄 Przeładowuję integrację Aquarea...

          Czas: {{ now().strftime('%H:%M:%S') }}
        notification_id: aquarea_watchdog
    # Przeładuj integrację Aquarea
    - service: homeassistant.reload_config_entry
      data:
        entry_id: "01KCFK1ETFE13JR1S6C97PT0QY"
    # Poczekaj 30 sekund na ponowne połączenie
    - delay:
        seconds: 30
    # Sprawdź czy naprawione
    - if:
        - condition: not
          conditions:
            - condition: state
              entity_id: water_heater.bodynek_nb_tank
              state: "unavailable"
      then:
        - service: persistent_notification.create
          data:
            title: "✅ Aquarea: Połączenie przywrócone"
            message: |
              ✅ Integracja Aquarea działa poprawnie po przeładowaniu.

              Temp CWU: {{ state_attr('water_heater.bodynek_nb_tank', 'current_temperature') }}°C
              Stan: {{ states('water_heater.bodynek_nb_tank') }}
            notification_id: aquarea_watchdog
      else:
        - service: persistent_notification.create
          data:
            title: "❌ Aquarea: Problem nadal występuje"
            message: |
              ❌ Przeładowanie nie pomogło. Możliwe przyczyny:
              - Problem z serwerami Panasonic Aquarea Cloud
              - Problem z adapterem WiFi pompy (CZ-TAW1)

              💡 Spróbuj: restart Home Assistant lub sprawdź aplikację Comfort Cloud
            notification_id: aquarea_watchdog
  mode: single

# ============================================
# CWU O 13:00 - NIEZALEŻNE OD CHMURY PANASONIC
# ============================================

- id: cwu_scheduled_1300
  alias: "[CWU] Harmonogram 13:00 - grzanie niezależne od chmury"
  description: "O 13:00 włącza wymuszenie CWU jeśli temp < cel. Backup dla harmonogramu Aquarea Cloud."
  trigger:
    - platform: time
      at: "13:02:00"
  condition:
    # Wszystkie warunki muszą być spełnione
    - condition: and
      conditions:
        # 1. Integracja dostępna
        - condition: not
          conditions:
            - condition: state
              entity_id: water_heater.bodynek_nb_tank
              state: "unavailable"
        # 2. CWU nie grzeje aktualnie
        - condition: not
          conditions:
            - condition: state
              entity_id: water_heater.bodynek_nb_tank
              state: "heating"
        # 3. Temperatura wody < cel, czyli potrzebuje grzania
        - condition: template
          value_template: >
            {% set current = state_attr('water_heater.bodynek_nb_tank', 'current_temperature') | float(0) %}
            {% set target = state_attr('water_heater.bodynek_nb_tank', 'temperature') | float(55) %}
            {{ current < target }}
  action:
    # Powiadomienie o uruchomieniu
    - service: persistent_notification.create
      data:
        title: "🌡️ CWU: Uruchamiam grzanie o 13:02"
        message: |
          🔄 Włączam wymuszenie CWU (backup harmonogramu chmury)

          Temp aktualna: {{ state_attr('water_heater.bodynek_nb_tank', 'current_temperature') }}°C
          Temp docelowa: {{ state_attr('water_heater.bodynek_nb_tank', 'temperature') }}°C
        notification_id: cwu_scheduled_1300
    # Włącz wymuszenie CWU
    - service: switch.turn_on
      target:
        entity_id: switch.bodynek_nb_wymus_c_w_u
    # Czekaj aż temperatura osiągnie cel (max 2h)
    - wait_template: >
        {{ state_attr('water_heater.bodynek_nb_tank', 'current_temperature') | float(0) >=
           state_attr('water_heater.bodynek_nb_tank', 'temperature') | float(55) }}
      timeout:
        hours: 2
      continue_on_timeout: true
    # Wyłącz wymuszenie CWU
    - service: switch.turn_off
      target:
        entity_id: switch.bodynek_nb_wymus_c_w_u
    # Powiadomienie o zakończeniu
    - service: persistent_notification.create
      data:
        title: "✅ CWU: Grzanie zakończone"
        message: |
          ✅ Temperatura osiągnięta!

          Temp końcowa: {{ state_attr('water_heater.bodynek_nb_tank', 'current_temperature') }}°C
        notification_id: cwu_scheduled_1300
  mode: single

- id: cwu_scheduled_0432
  alias: "[CWU] Harmonogram 04:32 - grzanie niezależne od chmury"
  description: "O 04:32 włącza wymuszenie CWU jeśli temp < cel. Backup dla harmonogramu Aquarea Cloud (rano)."
  trigger:
    - platform: time
      at: "04:32:00"
  condition:
    - condition: and
      conditions:
        # 1. Integracja dostępna
        - condition: not
          conditions:
            - condition: state
              entity_id: water_heater.bodynek_nb_tank
              state: "unavailable"
        # 2. CWU nie grzeje aktualnie
        - condition: not
          conditions:
            - condition: state
              entity_id: water_heater.bodynek_nb_tank
              state: "heating"
        # 3. Temperatura wody < cel
        - condition: template
          value_template: >
            {% set current = state_attr('water_heater.bodynek_nb_tank', 'current_temperature') | float(0) %}
            {% set target = state_attr('water_heater.bodynek_nb_tank', 'temperature') | float(55) %}
            {{ current < target }}
  action:
    - service: persistent_notification.create
      data:
        title: "🌡️ CWU: Uruchamiam grzanie o 04:32"
        message: |
          🔄 Włączam wymuszenie CWU (backup harmonogramu chmury - rano)

          Temp aktualna: {{ state_attr('water_heater.bodynek_nb_tank', 'current_temperature') }}°C
          Temp docelowa: {{ state_attr('water_heater.bodynek_nb_tank', 'temperature') }}°C
        notification_id: cwu_scheduled_0432
    - service: switch.turn_on
      target:
        entity_id: switch.bodynek_nb_wymus_c_w_u
    - wait_template: >
        {{ state_attr('water_heater.bodynek_nb_tank', 'current_temperature') | float(0) >=
           state_attr('water_heater.bodynek_nb_tank', 'temperature') | float(55) }}
      timeout:
        hours: 2
      continue_on_timeout: true
    - service: switch.turn_off
      target:
        entity_id: switch.bodynek_nb_wymus_c_w_u
    - service: persistent_notification.create
      data:
        title: "✅ CWU: Grzanie zakończone"
        message: |
          ✅ Temperatura osiągnięta!

          Temp końcowa: {{ state_attr('water_heater.bodynek_nb_tank', 'current_temperature') }}°C
        notification_id: cwu_scheduled_0432
  mode: single

# ============================================
# SEZONOWY TARGET SOC - AUTOMATYCZNA AKTUALIZACJA SUWAKA
# ============================================

- id: battery_seasonal_target_soc_startup
  alias: "[Bateria] Ustaw sezonowy Target SOC przy starcie HA"
  description: "Przy restarcie HA ustawia suwak Target SOC na sezonowe max (90% zima, 85% wiosna/jesień, 80% lato)"
  trigger:
    - platform: homeassistant
      event: start
  action:
    # Dłuższy delay żeby sensor template był już dostępny
    - delay:
        seconds: 60
    - service: input_number.set_value
      target:
        entity_id: input_number.battery_target_soc
      data:
        value: "{{ state_attr('sensor.bateria_limity_soc', 'max_soc') | int(80) }}"
    - service: persistent_notification.create
      data:
        title: "🔋 Target SOC ustawiony na sezonowy max"
        message: |
          ✅ Suwak Target SOC ustawiony na {{ state_attr('sensor.bateria_limity_soc', 'max_soc') }}%

          **Sezon:** {{ state_attr('sensor.bateria_limity_soc', 'season') }}
          **Limity:** {{ states('sensor.bateria_limity_soc') }}
        notification_id: battery_seasonal_target_soc
  mode: single

- id: battery_seasonal_target_soc_monthly
  alias: "[Bateria] Aktualizuj sezonowy Target SOC (1. dzień miesiąca)"
  description: "Pierwszego dnia miesiąca o 00:05 aktualizuje suwak Target SOC na nowy sezonowy max"
  trigger:
    - platform: time
      at: "00:05:00"
  condition:
    # Tylko pierwszego dnia miesiąca
    - condition: template
      value_template: "{{ now().day == 1 }}"
  action:
    - service: input_number.set_value
      target:
        entity_id: input_number.battery_target_soc
      data:
        value: "{{ state_attr('sensor.bateria_limity_soc', 'max_soc') | int(80) }}"
    - service: persistent_notification.create
      data:
        title: "🔋 Nowy sezon - Target SOC zaktualizowany"
        message: |
          ✅ Suwak Target SOC ustawiony na {{ state_attr('sensor.bateria_limity_soc', 'max_soc') }}%

          **Nowy sezon:** {{ state_attr('sensor.bateria_limity_soc', 'season') }}
          **Limity:** {{ states('sensor.bateria_limity_soc') }}
        notification_id: battery_seasonal_target_soc
  mode: single

# ============================================
# AUTO-KALIBRACJA PROGNOZY PV (EMA)
# ============================================

# Inicjalizacja CSV przy starcie HA
- id: pv_calibration_init_csv
  alias: "[PV] Inicjalizacja CSV kalibracji"
  description: "Przy starcie HA tworzy plik CSV jeśli nie istnieje"
  trigger:
    - platform: homeassistant
      event: start
  action:
    - service: shell_command.init_pv_calibration_csv
  mode: single

# Poranny snapshot surowej prognozy (08:00)
- id: pv_calibration_morning_snapshot
  alias: "[PV] Poranny snapshot prognozy (08:00)"
  description: "Zapisuje surową prognozę PV (bez korekcji) do input_number o 08:00"
  trigger:
    - platform: time
      at: "08:00:00"
  action:
    - service: input_number.set_value
      target:
        entity_id: input_number.pv_raw_forecast_today
      data:
        value: >
          {% set w = states('sensor.pv_wschod_prognoza_dzis') | float(0) %}
          {% set p = states('sensor.pv_poludnie_prognoza_dzis') | float(0) %}
          {% set z = states('sensor.pv_zachod_prognoza_dzis') | float(0) %}
          {{ (w + p + z) | round(1) }}
  mode: single

# Wieczorna kalibracja EMA (21:30)
- id: pv_calibration_evening_ema
  alias: "[PV] Wieczorna kalibracja EMA (21:30)"
  description: "Porównuje prognozę z rzeczywistą produkcją i aktualizuje współczynnik korekcji przez EMA"
  trigger:
    - platform: time
      at: "21:30:00"
  condition:
    - condition: template
      value_template: >
        {% set raw = states('input_number.pv_raw_forecast_today') | float(0) %}
        {% set real = states('sensor.dzienna_produkcja_pv_dc') | float(0) %}
        {{ raw > 1.0 and real > 0.5 }}
  action:
    # Oblicz ratio i nowy współczynnik
    - variables:
        raw_forecast: "{{ states('input_number.pv_raw_forecast_today') | float }}"
        real_production: "{{ states('sensor.dzienna_produkcja_pv_dc') | float }}"
        month_str: "{{ now().month | string }}"
        ratio_raw: "{{ (real_production / raw_forecast) | round(3) }}"
        ratio: "{{ [0.30, [1.10, (real_production / raw_forecast)] | min] | max | round(3) }}"
        corrections_json: "{{ states('input_text.pv_monthly_corrections') }}"
        defaults: '{"1":0.50,"2":0.60,"3":0.75,"4":0.85,"5":0.90,"6":0.90,"7":0.90,"8":0.90,"9":0.85,"10":0.75,"11":0.60,"12":0.50}'
    - variables:
        old_factor: >
          {% set c = corrections_json | from_json if corrections_json not in ['unknown', 'unavailable'] else defaults | from_json %}
          {{ c.get(month_str, 0.75) | float | round(3) }}
    - variables:
        new_factor: "{{ (0.7 * (old_factor | float) + 0.3 * (ratio | float)) | round(3) }}"
    # Aktualizuj JSON z nowymi współczynnikami (tylko bieżący miesiąc)
    - service: input_text.set_value
      target:
        entity_id: input_text.pv_monthly_corrections
      data:
        value: >
          {% set c = corrections_json | from_json if corrections_json not in ['unknown', 'unavailable'] else defaults | from_json %}
          {% set ns = namespace(result = {}) %}
          {% for k, v in c.items() %}
            {% if k == month_str %}
              {% set ns.result = dict(ns.result, **{k: new_factor | float | round(3)}) %}
            {% else %}
              {% set ns.result = dict(ns.result, **{k: v}) %}
            {% endif %}
          {% endfor %}
          {{ ns.result | to_json }}
    # Loguj do CSV (przez input_text buffer — shell_command nie ma dostępu do data:)
    - service: input_text.set_value
      target:
        entity_id: input_text.pv_calibration_line
      data:
        value: "{{ now().strftime('%Y-%m-%d') }},{{ raw_forecast }},{{ real_production }},{{ ratio }},{{ old_factor }},{{ new_factor }},{{ month_str }}"
    - service: shell_command.log_pv_calibration
    # Powiadomienie
    - service: persistent_notification.create
      data:
        title: "📊 PV Kalibracja EMA"
        message: |
          **{{ now().strftime('%Y-%m-%d') }} (miesiąc {{ month_str }}):**
          - Prognoza surowa: {{ raw_forecast }} kWh
          - Produkcja realna: {{ real_production }} kWh
          - Ratio: {{ ratio }} (surowe: {{ ratio_raw }})
          - Stary współczynnik: {{ old_factor }}
          - Nowy współczynnik: {{ new_factor }}
        notification_id: pv_calibration_ema

# ============================================
# PORÓWNANIE TARYFOWE: G12w vs Pstryk - RESETY
# ============================================

# Reset dzienny o północy
- id: tariff_comparison_daily_reset
  alias: "[Tariff] Reset dzienny porównania G12w vs Pstryk"
  description: "Zeruje dzienne koszty importu o północy"
  trigger:
    - platform: time
      at: "00:00:00"
  action:
    - service: input_number.set_value
      target:
        entity_id: input_number.g12w_koszt_import_dzienny
      data:
        value: 0
    - service: input_number.set_value
      target:
        entity_id: input_number.pstryk_koszt_import_dzienny
      data:
        value: 0
  mode: single

# Reset miesięczny 1-go dnia o północy
- id: tariff_comparison_monthly_reset
  alias: "[Tariff] Reset miesięczny porównania G12w vs Pstryk"
  description: "Zeruje miesięczne koszty importu 1-go dnia miesiąca"
  trigger:
    - platform: time
      at: "00:00:01"
  condition:
    - condition: template
      value_template: "{{ now().day == 1 }}"
  action:
    - service: input_number.set_value
      target:
        entity_id: input_number.g12w_koszt_import_miesiac
      data:
        value: 0
    - service: input_number.set_value
      target:
        entity_id: input_number.pstryk_koszt_import_miesiac
      data:
        value: 0
  mode: single
