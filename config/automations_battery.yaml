# ============================================
# AUTOMATYZACJE ALGORYTMU ZARZĄDZANIA BATERIĄ
# Zgodne z harmonogramem z ALGORITHM.md
# ============================================

# ============================================
# 21:05 - Oblicz strategię dzienną (okres 22:00 - 21:59)
# ============================================

- id: battery_calculate_daily_strategy
  alias: "[Bateria] Oblicz strategię dzienną 21:05"
  description: "Oblicza Target SOC na okres 22:00 dziś - 21:59 jutro (pełna doba od L2 noc)"
  trigger:
    - platform: time
      at: "21:05:00"
  action:
    # 1. Oblicz strategię dzienną (Target SOC)
    - service: python_script.calculate_daily_strategy
    # 2. Uruchom algorytm (wypełni analizę najtańszych godzin)
    - delay:
        seconds: 5
    - service: python_script.battery_algorithm
  mode: single

# ============================================
# CO 1 GODZINĘ - Wykonaj strategię (główna pętla)
# ============================================

- id: battery_execute_strategy_hourly
  alias: "[Bateria] Wykonaj strategię (co 1h)"
  description: "Główna pętla algorytmu - wykonywana co godzinę"
  trigger:
    - platform: time_pattern
      hours: "*"
      minutes: "00"
  action:
    - service: python_script.battery_algorithm
  mode: single

# ============================================
# KLUCZOWE MOMENTY - Dodatkowe wykonanie strategii
# ============================================

- id: battery_execute_strategy_key_moments
  alias: "[Bateria] Wykonaj strategię (kluczowe momenty)"
  description: "Dodatkowe wykonanie przy zmianach stref taryfowych"
  trigger:
    # Początek okna CWU rano
    - platform: time
      at: "04:30:00"
    # Zmiana L2 → L1 rano
    - platform: time
      at: "06:00:00"
    # Zmiana L1 → L2 południe
    - platform: time
      at: "13:00:00"
    # Zmiana L2 → L1 południe
    - platform: time
      at: "15:00:00"
    # SZCZYT wieczorny + arbitraż
    - platform: time
      at: "19:00:00"
    # Zmiana L1 → L2 wieczór + ładowanie
    - platform: time
      at: "22:00:00"
  action:
    - service: python_script.battery_algorithm
  mode: single

# ============================================
# SOC PRZEKROCZYŁ PRÓG - URUCHOM ALGORYTM
# ============================================

- id: battery_soc_threshold_crossed
  alias: "[Bateria] SOC przekroczył próg - uruchom algorytm"
  description: "Uruchamia algorytm gdy SOC przekroczy którykolwiek z progów sezonowych (min/max/rezerwa)"
  trigger:
    # === SPADEK PONIŻEJ (sezonowe minimum) ===
    - platform: numeric_state
      entity_id: sensor.akumulatory_stan_pojemnosci
      below: 10  # min zima
    - platform: numeric_state
      entity_id: sensor.akumulatory_stan_pojemnosci
      below: 15  # min wiosna/jesień
    - platform: numeric_state
      entity_id: sensor.akumulatory_stan_pojemnosci
      below: 20  # min lato
    # === WZROST POWYŻEJ (sezonowe maximum / rezerwa) ===
    - platform: numeric_state
      entity_id: sensor.akumulatory_stan_pojemnosci
      above: 30  # rezerwa weekend (nie-zima)
    - platform: numeric_state
      entity_id: sensor.akumulatory_stan_pojemnosci
      above: 80  # max lato + rezerwa weekend zima
    - platform: numeric_state
      entity_id: sensor.akumulatory_stan_pojemnosci
      above: 85  # max wiosna/jesień
    - platform: numeric_state
      entity_id: sensor.akumulatory_stan_pojemnosci
      above: 90  # max zima
  action:
    - service: python_script.battery_algorithm
  mode: single

# ============================================
# MONITOROWANIE KRYTYCZNE (co 1 minutę)
# ============================================

- id: battery_monitor_critical_soc
  alias: "[Bateria] Monitor SOC krytyczne"
  description: "Monitoruje SOC i reaguje na krytyczne wartości (<5%)"
  trigger:
    - platform: numeric_state
      entity_id: sensor.akumulatory_stan_pojemnosci
      below: 5
  action:
    - service: persistent_notification.create
      data:
        title: "🚨 BATERIA KRYTYCZNIE NISKA!"
        message: "SOC: {{ states('sensor.akumulatory_stan_pojemnosci') }}% - wymuszam ładowanie awaryjne!"
    - service: python_script.battery_algorithm
  mode: single

- id: battery_monitor_critical_soc_l1
  alias: "[Bateria] Monitor SOC niskie w L1"
  description: "Ostrzeżenie gdy SOC niskie w drogie strefie L1"
  trigger:
    - platform: numeric_state
      entity_id: sensor.akumulatory_stan_pojemnosci
      below: 20
  condition:
    - condition: state
      entity_id: sensor.strefa_taryfowa
      state: "L1"
  action:
    - service: persistent_notification.create
      data:
        title: "⚠️ Bateria niska w L1"
        message: "SOC: {{ states('sensor.akumulatory_stan_pojemnosci') }}% w drogie strefie L1!"
  mode: single

- id: battery_monitor_soc_max
  alias: "[Bateria] Monitor SOC maksymalne"
  description: "Backup awaryjny - zatrzymuje ładowanie gdy SOC przekroczy 90% (algorytm powinien zatrzymać przy 80%)"
  trigger:
    - platform: numeric_state
      entity_id: sensor.akumulatory_stan_pojemnosci
      above: 90
  action:
    - service: switch.turn_off
      target:
        entity_id: switch.akumulatory_ladowanie_z_sieci
    - service: persistent_notification.create
      data:
        title: "✅ Bateria naładowana"
        message: "SOC: {{ states('sensor.akumulatory_stan_pojemnosci') }}% - zatrzymano ładowanie"
  mode: single

# ============================================
# WYBUDZANIE BATERII Z SLEEP MODE
# ============================================

- id: battery_wake_from_sleep_l2_night
  alias: "[Bateria] Wybudź ze Sleep o 21:20 (przed L2 noc)"
  description: "Wymusza ładowanie gdy bateria jest w Sleep mode/Standby - max 5 prób wybudzenia przed L2 22:00. Start 40 min wcześniej bo bateria może potrzebować do 45 min na wybudzenie!"
  trigger:
    - platform: time
      at: "21:20:00"
  condition:
    - condition: or
      conditions:
        - condition: state
          entity_id: sensor.akumulatory_status
          state: "Sleep mode"
        - condition: state
          entity_id: sensor.akumulatory_status
          state: "Standby"
        - condition: state
          entity_id: sensor.akumulatory_status
          state: "Offline"
    - condition: template
      value_template: >
        {{ states('sensor.akumulatory_stan_pojemnosci') | float(0) <= states('input_number.battery_target_soc') | float(80) }}
  action:
    # Zapisz początkowy status
    - variables:
        initial_status: "{{ states('sensor.akumulatory_status') }}"
    # Pętla max 5 prób wybudzenia
    - repeat:
        count: 5
        sequence:
          # Próba wybudzenia
          - service: huawei_solar.forcible_charge
            data:
              device_id: "7aa193fa5ec07dc7da9f5034f97e6987"
              power: 5000
              duration: 30
          # Czekaj 60 sekund na reakcję baterii
          - delay:
              seconds: 60
          # Sprawdź czy bateria się wybudziła
          - if:
              - condition: state
                entity_id: sensor.akumulatory_status
                state: "Running"
            then:
              # Sukces! Powiadom i zakończ
              - service: persistent_notification.create
                data:
                  title: "🔋 Bateria wybudzona (21:20)"
                  message: |
                    ✅ Bateria wybudzona po {{ repeat.index }} próbie/próbach.
                    Status: {{ initial_status }} → Running
                    SOC: {{ states('sensor.akumulatory_stan_pojemnosci') }}%
                  notification_id: battery_wake_night
              - service: python_script.battery_algorithm
              - stop: "Bateria wybudzona pomyślnie"
    # Po 5 próbach - sprawdź czy się udało
    - if:
        - condition: template
          value_template: "{{ states('sensor.akumulatory_status') != 'Running' }}"
      then:
        # Niepowodzenie po 5 próbach
        - service: persistent_notification.create
          data:
            title: "🚨 BŁĄD: Nie udało się wybudzić baterii!"
            message: |
              ❌ Po 5 próbach bateria nadal nie pracuje!

              **Status:** {{ states('sensor.akumulatory_status') }}
              **SOC:** {{ states('sensor.akumulatory_stan_pojemnosci') }}%
              **Czas:** {{ now().strftime('%H:%M:%S') }}

              ⚠️ Sprawdź baterię ręcznie!
              Możliwe przyczyny:
              - Awaria komunikacji Modbus
              - Bateria w trybie Fault
              - Problem z inwerterem
            notification_id: battery_wake_night_failed
  mode: single

