# ============================================
# DIAGNOSTYKA WYBUDZANIA (INFORMACJE O POMINIĘCIU)
# ============================================

- id: battery_wake_diagnostic_l2_night
  alias: "[Bateria] 🔍 Diagnostyka - status po próbie wybudzenia o 21:20"
  description: "Informuje o statusie baterii o 21:21 (gdy wybudzanie pominięte)"
  trigger:
    - platform: time
      at: "21:21:00"
  condition:
    # Uruchom tylko jeśli bateria NIE pracuje (czyli wybudzanie nie zadziałało)
    - condition: template
      value_template: >
        {% set status = states('sensor.akumulatory_status') %}
        {% set soc = states('sensor.akumulatory_stan_pojemnosci') | float(0) %}
        {% set target = states('input_number.battery_target_soc') | float(80) %}
        {{ (status not in ['Sleep mode', 'Standby']) or (soc > target) }}
  action:
    - service: persistent_notification.create
      data:
        title: "🔍 Status baterii o 21:21 - diagnostyka"
        message: |
          **Status baterii:** {{ states('sensor.akumulatory_status') }}
          **SOC:** {{ states('sensor.akumulatory_stan_pojemnosci') }}%
          **Target SOC:** {{ states('input_number.battery_target_soc') }}%

          **Analiza (wybudzanie o 21:20 zostało pominięte):**
          {% set status = states('sensor.akumulatory_status') %}
          {% set soc = states('sensor.akumulatory_stan_pojemnosci') | float(0) %}
          {% set target = states('input_number.battery_target_soc') | float(80) %}

          {% if status == 'Running' %}
          ✅ Bateria już pracuje (Running) - wybudzanie niepotrzebne
          {% elif status == 'Offline' %}
          ⚠️ Bateria OFFLINE - sprawdź połączenie!
          {% elif status == 'Fault' %}
          🔴 Bateria w stanie FAULT - sprawdź błędy!
          {% elif soc > target %}
          ✅ SOC ({{ soc }}%) > Target ({{ target }}%) - ładowanie niepotrzebne
          {% else %}
          ❓ Status: {{ status }} - nieznana przyczyna
          {% endif %}

          Algorytm uruchomi się o 22:00:00 (główna pętla).
        notification_id: battery_wake_diagnostic_night
  mode: single

- id: battery_wake_diagnostic_l2_midday
  alias: "[Bateria] 🔍 Diagnostyka - status po próbie wybudzenia o 12:40"
  description: "Informuje o statusie baterii o 12:41 (gdy wybudzanie pominięte)"
  trigger:
